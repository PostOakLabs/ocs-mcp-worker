# ─────────────────────────────────────────────────────────────────────────────
# Pre-flight — OCS MCP Worker
#
# Validates the committed data/tools-manifest.json before and alongside
# Cloudflare's GitHub App deploy. Catches: JSON corruption, missing required
# fields, invalid category/register values, and broken chain step references
# (slugs that don't exist in the tools dict — would silently produce wrong URLs
# in build_ocs_workflow_links).
#
# Why committed data rather than re-running generate.mjs:
#   generate.mjs reads from ../repo/tools/data/tools-manifest.json (a local
#   filesystem path). That path doesn't exist in Cloudflare's CI or in this
#   runner. The manifest is committed to data/ so Cloudflare's ASSETS binding
#   can serve it — we validate what Cloudflare will actually deploy.
#
# The freshness problem (committed data being stale) is solved at the source:
#   PostOakLabs/OCS deploy.yml auto-syncs this repo after every live site
#   deploy, so the manifest in data/ always matches the one in the site repo.
#
# Triggers
#   • Push to master      → runs automatically alongside Cloudflare deploy
#   • workflow_dispatch   → manual trigger for ad-hoc validation
#
# No secrets required — pure python3 validation of committed files.
# ─────────────────────────────────────────────────────────────────────────────

name: Pre-flight — MCP Worker

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Validate manifest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate tools-manifest.json
        run: |
          python3 << 'PYEOF'
          import json, sys

          VALID_CATEGORIES = {
              'imbh-evidence', 'bh-physics', 'fermi-paradox',
              'fermi-seti', 'mth', 'kardashev'
          }
          VALID_REGISTERS = {'peer-reviewed', 'speculative'}
          MIN_TOOLS  = 19
          MIN_CHAINS = 39

          # ── Load ────────────────────────────────────────────────────────────
          try:
              with open('data/tools-manifest.json') as f:
                  raw = f.read()
          except FileNotFoundError:
              print('::error::data/tools-manifest.json not found — did generate.mjs run before this commit?')
              sys.exit(1)

          try:
              m = json.loads(raw)
          except json.JSONDecodeError as e:
              print(f'::error::Invalid JSON: {e}')
              sys.exit(1)

          errors = []

          # ── Top-level structure ──────────────────────────────────────────────
          for key in ('_meta', 'tools', 'chains'):
              if key not in m:
                  errors.append(f'Missing top-level key: {key!r}')

          if errors:
              for e in errors:
                  print(f'::error::{e}')
              sys.exit(1)

          tools  = m['tools']
          chains = m['chains']

          # ── Counts ──────────────────────────────────────────────────────────
          if len(tools) < MIN_TOOLS:
              errors.append(
                  f'Only {len(tools)} tools — expected ≥{MIN_TOOLS}. '
                  'Manifest may be truncated or stale.'
              )
          if len(chains) < MIN_CHAINS:
              errors.append(
                  f'Only {len(chains)} chains — expected ≥{MIN_CHAINS}. '
                  'Manifest may be truncated or stale.'
              )

          # ── Per-tool validation ──────────────────────────────────────────────
          for slug, t in tools.items():
              for field in ('title', 'path', 'category', 'register', 'inputs'):
                  if field not in t:
                      errors.append(f'Tool {slug!r}: missing required field {field!r}')
              path = t.get('path', '')
              if not (path.startswith('tools/') and path.endswith('.html')):
                  errors.append(
                      f'Tool {slug!r}: bad path {path!r} — '
                      'must start with "tools/" and end with ".html"'
                  )
              cat = t.get('category', '')
              if cat and cat not in VALID_CATEGORIES:
                  errors.append(
                      f'Tool {slug!r}: unknown category {cat!r} — '
                      f'valid: {sorted(VALID_CATEGORIES)}'
                  )
              reg = t.get('register', '')
              if reg and reg not in VALID_REGISTERS:
                  errors.append(
                      f'Tool {slug!r}: unknown register {reg!r} — '
                      f'valid: {sorted(VALID_REGISTERS)}'
                  )

          # ── Chain integrity (warning only) ───────────────────────────────────
          # Chains reference slugs from the full ~91-tool site, not just the
          # 19 MCP-registered tools in the tools dict. A slug absent from the
          # tools dict is normal — the page exists on the site at tools/{slug}.html
          # and build_ocs_workflow_links generates the correct URL.
          # Missing "tool" key entirely IS an error.
          warnings = []
          for chain_name, chain in chains.items():
              for i, step in enumerate(chain.get('steps', [])):
                  step_tool = step.get('tool', '')
                  if not step_tool:
                      errors.append(
                          f'Chain {chain_name!r} step {i+1}: missing "tool" key'
                      )
                  elif step_tool not in tools:
                      warnings.append(
                          f'Chain {chain_name!r} step {i+1}: '
                          f'slug {step_tool!r} not in MCP tools dict '
                          f'(ok — maps to tools/{step_tool}.html on site)'
                      )

          # ── Result ──────────────────────────────────────────────────────────
          if warnings:
              print(f'ℹ️  {len(warnings)} chain step(s) reference non-MCP tools (expected):')
              for w in warnings:
                  print(f'::notice::{w}')

          if errors:
              for e in errors:
                  print(f'::error::{e}')
              print(f'\n❌ {len(errors)} error(s) found. Fix before Cloudflare deploy lands.')
              sys.exit(1)

          print(f'✅ {len(tools)} tools, {len(chains)} chains — manifest valid')
          print('✅ All required fields, paths, categories, and registers valid')
          print(f'✅ Chain steps: {len(warnings)} non-MCP slugs (notices only, not errors)')
          PYEOF

      - name: Pre-flight summary
        if: always()
        run: |
          TOOL_COUNT=$(python3 -c "
          import json, sys
          try:
            m = json.load(open('data/tools-manifest.json'))
            print(len(m.get('tools', {})))
          except Exception:
            print('N/A')
          " 2>/dev/null || echo "N/A")
          CHAIN_COUNT=$(python3 -c "
          import json, sys
          try:
            m = json.load(open('data/tools-manifest.json'))
            print(len(m.get('chains', {})))
          except Exception:
            print('N/A')
          " 2>/dev/null || echo "N/A")
          {
            echo "## MCP Worker pre-flight summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Tools in manifest | $TOOL_COUNT |"
            echo "| Workflow chains | $CHAIN_COUNT |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Cloudflare deploy | via deploy job below (GitHub Actions) |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Deploy ────────────────────────────────────────────────────────────────
  # Real deploy via GitHub Actions + wrangler-action (NOT a Cloudflare GitHub
  # App). Gated on preflight, master pushes only. A failed deploy leaves the
  # live worker untouched. Does NOT run generate.mjs (it reads ../repo, which
  # doesn't exist in CI) — deploys the committed data/tools-manifest.json that
  # the ASSETS binding serves. Needs repo secrets CLOUDFLARE_API_TOKEN (scoped
  # to this account + the omegacentauri.me zone) and CLOUDFLARE_ACCOUNT_ID.
  deploy:
    name: Deploy to Cloudflare Workers
    needs: preflight
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"          # Wrangler 4.99 + run_worker_first require Node >=22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.99.0"
          command: deploy

  # ── Post-deploy smoke ───────────────────────────────────────────────────────
  # Assert the LIVE /mcp matches what we just deployed (AINumbers §2.4 analogue).
  # A green wrangler deploy does NOT prove the handshake serves the right tools —
  # this hits the live endpoint and checks:
  #   1. /mcp tools/list returns EXACTLY the 4 registered MCP tools (handshake OK,
  #      no tool dropped/renamed). NOTE: these 4 are the callable MCP surface —
  #      distinct from the manifest's tool CATALOG (the searchable data the
  #      list_ocs_tools tool returns) and from the named chains.
  #   2. list_ocs_tools returns count == committed manifest catalog count, proving
  #      the deployed ASSETS manifest matches the repo (catalog not stale/truncated).
  #   3. build_ocs_workflow_links advertises chain count == committed manifest chains.
  # Gentle call cadence (3 POSTs, retries) to stay under the /mcp WAF rate limit.
  smoke:
    name: Post-deploy MCP smoke
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Assert live /mcp matches committed manifest
        run: |
          set -euo pipefail
          ENDPOINT="https://mcp.omegacentauri.me/mcp"
          ACCEPT="application/json, text/event-stream"
          # Give the new Cloudflare version a moment to propagate globally.
          sleep 15

          mcp_call () {  # $1 = json-rpc body ; writes parsed JSON to $2
            local body="$1" out="$2" raw
            raw=$(curl -s -X POST "$ENDPOINT" \
                    -H "Content-Type: application/json" -H "Accept: ${ACCEPT}" \
                    --max-time 25 --retry 3 --retry-delay 6 -d "$body")
            # Streamable-HTTP replies as SSE ("data: {…}") or plain JSON — normalise.
            printf '%s' "$raw" | sed -n 's/^data: //p' | head -1 > "$out"
            [ -s "$out" ] || printf '%s' "$raw" > "$out"
          }

          mcp_call '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' /tmp/list.json
          mcp_call '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"list_ocs_tools","arguments":{"limit":500}}}' /tmp/catalog.json
          mcp_call '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"build_ocs_workflow_links","arguments":{"chain":"workflow-black-hole-101"}}}' /tmp/chain.json

          python3 << 'PYEOF'
          import json, sys
          fail = []
          m = json.load(open('data/tools-manifest.json', encoding='utf-8'))
          cat_expected   = len(m['tools'])
          chain_expected = len(m['chains'])

          # 1. registered MCP tools
          names = sorted(t['name'] for t in json.load(open('/tmp/list.json', encoding='utf-8'))['result']['tools'])
          expected = sorted(['list_ocs_tools', 'constraint_stacker',
                             'build_ocs_workflow_links', 'verify_execution_hash'])
          if names != expected:
              fail.append(f'/mcp tools/list = {names}, expected {expected}')
          else:
              print(f'OK  registered MCP tools: {names}')

          # 2. list_ocs_tools catalog count == committed manifest
          cat = json.load(open('/tmp/catalog.json', encoding='utf-8'))['result']['structuredContent']['count']
          if cat != cat_expected:
              fail.append(f'list_ocs_tools count = {cat}, committed catalog = {cat_expected} (manifest skew)')
          else:
              print(f'OK  catalog count: {cat} == committed {cat_expected}')

          # 3. build_ocs_workflow_links chains advertised == committed manifest
          desc = next(t for t in json.load(open('/tmp/list.json', encoding='utf-8'))['result']['tools']
                      if t['name'] == 'build_ocs_workflow_links')['description']
          import re
          mnum = re.search(r'Named chains \((\d+) total\)', desc)
          live_chains = int(mnum.group(1)) if mnum else -1
          if live_chains != chain_expected:
              fail.append(f'build_ocs_workflow_links advertises {live_chains} chains, committed = {chain_expected}')
          else:
              print(f'OK  chain count: {live_chains} == committed {chain_expected}')

          if fail:
              for f in fail:
                  print(f'::error::{f}')
              print(f'\n❌ live /mcp diverges from committed manifest ({len(fail)} issue(s)).')
              sys.exit(1)
          print('\n✅ live /mcp matches the committed manifest.')
          PYEOF
